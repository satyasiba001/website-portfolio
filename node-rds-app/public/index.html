<!DOCTYPE html>
<html>

<head>
    <title>Employee Directory</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        table {
            border-collapse: collapse;
            width: 70%;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
        }

        th {
            background: #f2f2f2;
        }

        h1 {
            color: #333;
        }
    </style>
</head>

<body>

    <h1>Employees from AWS RDS</h1>

    <table id="employeeTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Created At</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        fetch('/api/employees')
            .then(response => response.json())
            .then(data => {
                const tbody = document.querySelector('#employeeTable tbody');

                data.forEach(emp => {
                    tbody.innerHTML += `
        <tr>
            <td>${emp.id}</td>
            <td>${emp.name}</td>
            <td>${emp.department}</td>
            <td>${emp.created_at}</td>
        </tr>`;
                });
            })
            .catch(err => console.error(err));
    </script>

</body>

</html>
